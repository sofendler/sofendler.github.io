<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sortir à paris</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      padding: 3rem 1.5rem;
    }

    header {
      max-width: 680px;
      margin: 0 auto 3rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
    }

    .back {
      color: #555;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back:hover {
      color: #fff;
    }

    .add-form {
      max-width: 680px;
      margin: 0 auto 2.5rem;
      display: flex;
      gap: 0.75rem;
    }

    .add-form input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 0.65rem 1rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: #555;
    }

    .add-form input::placeholder {
      color: #444;
    }

    .add-form input[name="label"] {
      width: 180px;
      flex-shrink: 0;
    }

    .add-form input[name="url"] {
      flex: 1;
    }

    .add-form button {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 0.65rem 1.2rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .add-form button:hover {
      border-color: #fff;
      color: #fff;
    }

    .links-list {
      max-width: 680px;
      margin: 0 auto;
      list-style: none;
    }

    .links-list li {
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #1c1c1c;
      padding: 1rem 0;
    }

    .links-list li:first-child {
      border-top: 1px solid #1c1c1c;
    }

    .link-label {
      color: #aaa;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: 180px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url {
      flex: 1;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 300;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .link-url:hover {
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #888;
    }

    .stars {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
    }

    .star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.1rem;
      color: #2a2a2a;
      transition: color 0.15s, transform 0.1s;
    }

    .star.filled {
      color: #c8a84b;
    }

    .star:hover,
    .stars:hover .star {
      color: #444;
    }

    .stars:hover .star.hover-active {
      color: #c8a84b;
    }

    .empty {
      max-width: 680px;
      margin: 0 auto;
      color: #333;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      padding-top: 1rem;
      border-top: 1px solid #1c1c1c;
    }

    .error {
      max-width: 680px;
      margin: -1.5rem auto 1.5rem;
      color: #663333;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sortir à paris</h1>
    <a class="back" href="index.html">← retour</a>
  </header>

  <form class="add-form" id="addForm">
    <input type="text" name="label" placeholder="Nom du lieu" autocomplete="off">
    <input type="url" name="url" placeholder="https://..." autocomplete="off">
    <button type="submit">Ajouter</button>
  </form>

  <p class="error" id="error"></p>

  <ul class="links-list" id="linksList"></ul>

  <script>
    const STORAGE_KEY = 'paris-links';

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save(links) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function render() {
      const links = load();
      const list = document.getElementById('linksList');
      list.innerHTML = '';

      if (links.length === 0) {
        list.innerHTML = '<p class="empty">Aucun lien enregistré.</p>';
        return;
      }

      links.forEach((item, index) => {
        const li = document.createElement('li');

        const label = document.createElement('span');
        label.className = 'link-label';
        label.textContent = item.label;
        label.title = item.label;

        const a = document.createElement('a');
        a.className = 'link-url';
        a.href = item.url;
        a.textContent = item.url;
        a.title = item.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        // Stars rating
        const stars = document.createElement('div');
        stars.className = 'stars';

        for (let s = 1; s <= 5; s++) {
          const star = document.createElement('button');
          star.className = 'star' + (s <= (item.rating || 0) ? ' filled' : '');
          star.textContent = '★';
          star.title = s + ' étoile' + (s > 1 ? 's' : '');
          star.dataset.value = s;

          star.addEventListener('mouseenter', () => {
            stars.querySelectorAll('.star').forEach(st => {
              st.classList.remove('hover-active');
              if (Number(st.dataset.value) <= s) st.classList.add('hover-active');
            });
          });
          star.addEventListener('mouseleave', () => {
            stars.querySelectorAll('.star').forEach(st => st.classList.remove('hover-active'));
          });
          star.addEventListener('click', () => {
            const links = load();
            // Click same rating again → reset to 0
            links[index].rating = links[index].rating === s ? 0 : s;
            save(links);
            render();
          });

          stars.appendChild(star);
        }

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = 'Supprimer';
        del.addEventListener('click', () => {
          const links = load();
          links.splice(index, 1);
          save(links);
          render();
        });

        li.appendChild(stars);
        li.appendChild(label);
        li.appendChild(a);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    document.getElementById('addForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const form = e.target;
      const label = form.label.value.trim();
      const url = form.url.value.trim();
      const errorEl = document.getElementById('error');

      if (!label || !url) {
        errorEl.textContent = 'Veuillez renseigner un nom et une URL.';
        return;
      }

      errorEl.textContent = '';
      const links = load();
      links.push({ label, url, rating: 0 });
      save(links);
      form.reset();
      render();
    });

    render();
  </script>
</body>
</html>
