<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sofendler</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      color: #ffffff;
      font-size: 4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      color: #555;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-bottom: 1px solid #222;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    nav a:hover {
      color: #fff;
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <h1>Bonjour Sonia</h1>
    <nav>
      <a href="simulateur-taxes.html">Simulateur d'impôt</a>
    </nav>
  </div>
</body>
</html>
